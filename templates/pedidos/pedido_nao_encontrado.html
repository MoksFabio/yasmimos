{% extends "base.html" %}
{% load static %}

{% block content %}
<div style="text-align: center; padding: 80px 20px;">
    <i class="fas fa-exclamation-circle" style="font-size: 4rem; color: #dc3545; margin-bottom: 20px;"></i>
    <h1 style="font-family: var(--font-serif); color: #dc3545; margin-bottom: 20px;">Esse pedido não foi encontrado.</h1>
    <p style="font-size: 1.2rem; margin-bottom: 30px; color: var(--text-light);">Talvez ele tenha sido excluído ou o link esteja incorreto.</p>
    
    <a href="/" class="btn" style="background-color: var(--accent-color); color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; display: inline-block; font-weight: bold; box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);">
        Voltar ao Início
    </a>
</div>
{% endblock %}
