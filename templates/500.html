{% extends 'base.html' %}
{% load static %}

{% block title %}Erro Interno{% endblock %}

{% block content %}
<div
    style="min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px;">

    <!-- Icon Container -->
    <div style="font-size: 6rem; color: #ff9800; margin-bottom: 20px; position: relative;">
        <i class="fas fa-exclamation-triangle"></i>
        <i class="fas fa-utensils"
            style="font-size: 2.5rem; position: absolute; bottom: -5px; right: -10px; color: var(--accent-color); background: var(--card-bg); border-radius: 50%; padding: 5px;"></i>
    </div>

    <h1 style="font-family: var(--font-serif); color: var(--text-color); margin-bottom: 15px; font-size: 2.5rem;">
        Erro na Cozinha!
    </h1>


    <p style="font-size: 1.1rem; color: var(--text-light); max-width: 500px; margin-bottom: 30px; line-height: 1.6;">
        Tivemos um problema técnico ao preparar sua página. Nossos confeiteiros (desenvolvedores) já foram avisados e
        estão limpando a bagunça.
    </p>

    <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
        <a href="{% url 'produtos:lista' %}" class="btn-primary"
            style="background-color: var(--accent-color); color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 600; box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3); transition: transform 0.2s;">
            <i class="fas fa-redo" style="margin-right: 8px;"></i> Tentar Novamente
        </a>
    </div>

</div>
{% endblock %}
