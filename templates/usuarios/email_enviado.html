{% extends "base.html" %}
{% block content %}
<div style="max-width: 500px; margin: 0 auto; background: var(--card-bg); padding: 40px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center;">
    <h1 style="font-family: var(--font-serif); color: var(--accent-color); margin-bottom: 20px;">Verifique seu E-mail</h1>
    <p style="margin-bottom: 20px; color: var(--text-light); line-height: 1.6;">
        Enviamos instruções para redefinir sua senha para o e-mail informado.<br>
        Se não encontrar, verifique sua pasta de Spam ou Lixo Eletrônico.
    </p>
    <a href="{% url 'usuarios:login' %}" class="btn">Voltar ao Login</a>
</div>
{% endblock %}
