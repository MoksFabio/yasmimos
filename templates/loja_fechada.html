{% extends 'base.html' %}
{% load static %}

{% block title %}Loja Fechada - YasMimos{% endblock %}

{% block content %}
<div
    style="min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px;">

    <!-- Icon Container -->
    <div style="font-size: 6rem; color: var(--accent-color); margin-bottom: 20px;">
        <i class="fas fa-store-slash"></i>
    </div>

    <h1 style="font-family: var(--font-serif); color: var(--text-color); margin-bottom: 15px; font-size: 2.5rem;">
        Loja Temporariamente Fechada
    </h1>

    <p style="font-size: 1.1rem; color: var(--text-light); max-width: 500px; margin-bottom: 30px; line-height: 1.6;">
        Estamos preparando novidades deliciosas ou repondo nosso estoque. <br>
        Voltaremos em breve!
    </p>

    <!-- Optional: Display delivery notice from settings if available (via context processor) -->


    <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
        <a href="{% url 'carrinho:cart_detail' %}" class="btn-primary"
            style="background-color: var(--accent-color); color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 600; box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3); transition: transform 0.2s;">
            <i class="fas fa-shopping-cart" style="margin-right: 8px;"></i> Voltar ao Carrinho
        </a>
        <a href="https://wa.me/5581983964906" target="_blank" class="btn-primary"
            style="background-color: #25D366; color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 600; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); transition: transform 0.2s;">
            <i class="fab fa-whatsapp" style="margin-right: 8px;"></i> Falar no WhatsApp
        </a>
    </div>

</div>

<script>
    // Check store status every 10 seconds
    setInterval(function () {
        fetch("{% url 'sistema:get_status' %}")
            .then(response => response.json())
            .then(data => {
                if (data.is_open) {
                    // Store opened! Redirect back to cart immediately
                    window.location.href = "{% url 'carrinho:cart_detail' %}";
                }
            })
            .catch(err => console.error("Error checking status", err));
    }, 10000);
</script>
{% endblock %}
